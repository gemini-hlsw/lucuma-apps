scalar Long

scalar BigDecimal

scalar Timestamp

type TimeSpan {
  microseconds: Long!
  milliseconds: BigDecimal!
  seconds: BigDecimal!
  minutes: BigDecimal!
  hours: BigDecimal!
  iso: String!
}

scalar Date

scalar ProgramReferenceLabel

enum Site {
  GN
  GS
}

type TimestampInterval {
  start: Timestamp!
  end: Timestamp!
  duration: TimeSpan!
}

enum TelescopeAvailability {
  OPEN
  CLOSED
}

enum TooSupport {
  STANDARD
  INTERRUPT
  RAPID
  NONE
}

enum TelescopeModeType {
  QUEUE
  CLASSICAL
  PRIORITY_VISITOR
  ENGINEERING
  COMMISSIONING
}

type TelescopeMode {
  type: TelescopeModeType!
  programReference: ProgramReferenceLabel
}

type TelescopeAvailabilityStatus {
  interval: TimestampInterval!
  availability: TelescopeAvailability!
  reason: String
  plannedAvailability: TelescopeAvailability
  site: Site!
}

type TelescopeTooStatus {
  interval: TimestampInterval!
  tooSupport: TooSupport!
  site: Site!
}

type TelescopeModeStatus {
  interval: TimestampInterval!
  site: Site!
  mode: TelescopeMode!
}

type TelescopeNightTimeline {
  site: Site!
  observingNight: Date!
  displayInterval: TimestampInterval!
  availability: [TelescopeAvailabilityStatus!]!
  tooStatus: [TelescopeTooStatus!]!
  modes: [TelescopeModeStatus!]!
}

type Query {
  telescopeNightTimeline(site: Site!, observingNight: Date!): TelescopeNightTimeline
}