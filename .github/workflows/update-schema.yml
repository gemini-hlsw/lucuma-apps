name: Update schemas

on:
  schedule:
    # Daily
    - cron: '0 0 * * *'
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  update-graphql-schemas:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout current branch (full)
        uses: actions/checkout@v7
        with:
          fetch-depth: 0
      - name: Generate token
        id: generate-token
        uses: actions/create-github-app-token@v3
        with:
          client-id: ${{ vars.LUCUMA_STEWARD_APP_ID }}
          private-key: ${{ secrets.WORKFLOW_GH_TOKEN }}

      - name: Setup pnpm
        uses: pnpm/action-setup@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 'lts/*'
          registry-url: 'https://registry.npmjs.org'
          cache: pnpm

      - name: pnpm install
        run: pnpm ci --filter lucuma-schemas --prefer-offline
        env:
          FONTAWESOME_NPM_AUTH_TOKEN: ${{ secrets.FONTAWESOME_NPM_AUTH_TOKEN }}

      - name: Fetch latest ODB schema
        run: pnpm schemas fetch-schema dev
      - name: Fetch latest Resource schema
        run: pnpm schemas fetch-schema dev resource
      
      - name: Create Pull Request
        id: cpr
        uses: peter-evans/create-pull-request@v8
        with:
          title: Update GraphQL Schemas
          commit-message: Update GraphQL Schemas
          committer: lucuma-steward[bot] <106720676+lucuma-steward[bot]@users.noreply.github.com>
          author: lucuma-steward[bot] <106720676+lucuma-steward[bot]@users.noreply.github.com>
          branch: steward/update-graphql-schemas
          delete-branch: true
          token: ${{ steps.generate-token.outputs.token }}
      - name: Check Pull Request
        run: |
          echo "Pull Request Number - ${{ steps.cpr.outputs.pull-request-number }}"
          echo "Pull Request URL - ${{ steps.cpr.outputs.pull-request-url }}"
