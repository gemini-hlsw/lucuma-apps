# Web server related configuration
web-server {
    host = "0.0.0.0"                            # Interface to listen on, 0.0.0.0 listens in all interfaces, production instances should be more restrictive.
    port = 9091                                 # Port to serve https requests
    insecure-port = 9092                        # Port for redirects to https
    external-base-url = "local.lucuma.xyz:8082" # External url used for redirects

    tls {
        key-store = "cacerts.jks.dev"
        key-store-pwd = "passphrase"
        cert-pwd = "passphrase"
    }
}

database {
    database-url = ${?DATABASE_URL}

    max-connections = 12
}
